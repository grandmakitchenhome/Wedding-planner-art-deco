<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planner — Art Deco ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --black:       #0A0A0A;
  --charcoal:    #1A1A1A;
  --gold:        #C9A84C;
  --gold-light:  #E8D49A;
  --gold-dark:   #8B6914;
  --ivory:       #FAF7F0;
  --white:       #FFFEF9;
  --text-main:   #1A1A1A;
  --text-muted:  #5A5A5A;
  --border:      #E0D4B8;
  --green:       #4A7C59;
  --red:         #C94040;
  --sidebar-w:   220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'EB Garamond','Cormorant Garamond',Georgia,serif;font-size:17px;background:var(--ivory);color:var(--text-main);line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:0}
.pf{font-family:'Playfair Display',serif}

/* ── LAYOUT SHELL ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--black);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:200;transition:transform .3s ease}
.sb-brand{padding:22px 18px 16px;border-bottom:1px solid rgba(201,168,76,.2)}
.sb-names{font-family:'Playfair Display',serif;font-size:17px;color:#fff;font-weight:700;letter-spacing:.3px;line-height:1.3}
.sb-date{font-size:13px;color:var(--gold);font-style:italic;margin-top:3px}
.sb-countdown{margin-top:10px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:0;padding:8px 10px;text-align:center}
.sb-days{font-family:'Playfair Display',serif;font-size:27px;color:var(--gold-light);font-weight:700;line-height:1}
.sb-days-lbl{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,.45);font-size:15px;transition:all .2s;border-left:3px solid transparent;position:relative;user-select:none}
.sb-item:hover{color:#fff;background:rgba(201,168,76,.07)}
.sb-item.active{color:#fff;background:rgba(201,168,76,.12);border-left-color:var(--gold)}
.sb-item .si-ico{flex-shrink:0;width:20px;display:flex;align-items:center;justify-content:center}
.sb-item .si-lbl{font-weight:500;font-size:14.5px}
.sb-item .si-dot{width:5px;height:5px;background:var(--gold-light);transform:rotate(45deg);position:absolute;right:14px;top:50%;margin-top:-2.5px;opacity:0}
.sb-item.done .si-dot{opacity:1}
.sb-prog{padding:14px 18px;border-top:1px solid rgba(201,168,76,.15)}
.sb-prog-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:7px}
.sb-prog-track{height:3px;background:rgba(255,255,255,.1);border-radius:0;overflow:hidden}
.sb-prog-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold-light));border-radius:0;transition:width .5s ease}
.sb-prog-pct{font-size:12px;color:var(--gold);margin-top:5px;text-align:right}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--ivory)}

/* ── TOPBAR ── */
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:14px}
#hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gold);line-height:1;padding:0}
.tb-crumb{font-size:15px;color:var(--text-muted)}
.tb-crumb strong{color:var(--gold-dark);font-weight:600}
#budget-pill{background:var(--ivory);border:1px solid var(--gold);border-radius:0;padding:7px 16px;font-size:15.5px;color:var(--gold-dark);cursor:pointer;font-weight:600;font-family:'Cormorant Garamond',serif;transition:background .2s}
#budget-pill:hover{background:rgba(201,168,76,.12)}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto}

/* ── HERO ── */
.hero-wrap{position:relative;height:220px;overflow:hidden;flex-shrink:0}
.hero-img{width:100%;height:100%;object-fit:cover;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.9) 0%,rgba(10,10,10,.08) 55%,transparent 100%)}
.hero-text{position:absolute;bottom:0;left:0;right:0;padding:22px 32px}
.hero-num{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:5px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;color:#fff;font-weight:400;line-height:1.2}
.hero-tagline{font-size:16px;color:rgba(201,168,76,.75);font-style:italic;margin-top:5px}

/* ── ART DECO FRAME ── */
.deco-frame{position:absolute;inset:10px;border:1px solid rgba(201,168,76,.45);pointer-events:none;z-index:2}
.deco-corner{position:absolute;width:8px;height:8px;background:var(--gold);transform:rotate(45deg)}
.deco-corner.tl{top:-4px;left:-4px}
.deco-corner.tr{top:-4px;right:-4px}
.deco-corner.bl{bottom:-4px;left:-4px}
.deco-corner.br{bottom:-4px;right:-4px}

/* ── DECO DIVIDER ── */
.deco-divider{background:var(--ivory);padding:0;line-height:0;flex-shrink:0}

/* ── STAGE BODY ── */
.stage-body{padding:28px 32px}

/* ── CARDS ── */
.card{background:var(--white);border-radius:0;padding:22px 24px;border:1px solid var(--border);border-top:2px solid var(--gold);margin-bottom:20px}
.card-hdr{margin-bottom:18px}
.card-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--charcoal);font-weight:700;margin-bottom:4px}
.card-sub{font-size:16px;color:var(--text-muted);font-style:italic}

/* ── FORMS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fld{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark)}
.inp{padding:9px 13px;border:1px solid var(--border);border-radius:0;font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text-main);background:var(--white);outline:none;transition:border .2s,box-shadow .2s;width:100%}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
textarea.inp{resize:vertical;min-height:76px}
select.inp{appearance:auto;cursor:pointer}

/* ── BUTTONS ── */
.gold-btn{background:var(--gold-dark);color:#fff;border:none;padding:9px 22px;border-radius:0;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:.5px;transition:all .2s;box-shadow:0 2px 10px rgba(139,105,20,.3)}
.gold-btn:hover{background:var(--gold);transform:translateY(-1px)}
.ghost-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:9px 20px;border-radius:0;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;transition:all .2s}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold-dark)}
.rose-btn{background:var(--gold-dark);color:#fff;border:none;padding:8px 16px;border-radius:0;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;transition:background .2s}
.rose-btn:hover{background:var(--gold)}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--border);font-size:22px;line-height:1;transition:color .2s;padding:0 4px}
.remove-btn:hover{color:var(--red)}
.link-btn{background:none;border:none;cursor:pointer;color:var(--gold-dark);font-family:'Cormorant Garamond',serif;font-size:15px;text-decoration:underline;text-underline-offset:2px;transition:color .2s;padding:0}
.link-btn:hover{color:var(--gold)}
.outline-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 12px;border-radius:0;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:14px;transition:all .2s}
.outline-btn:hover{border-color:var(--gold);color:var(--gold-dark)}

/* ── STATS ── */
.stats-grid{display:grid;gap:10px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:0;padding:14px 16px;border:1px solid var(--border);border-top:2px solid var(--gold);text-align:center}
.stat-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--charcoal);margin-top:4px}

/* ── PROGRESS BAR ── */
.prog-bg{height:4px;background:var(--border);border-radius:0;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:0;transition:width .5s ease}

/* ── BUDGET TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:16px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.cat-link{color:var(--gold-dark);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.cat-link:hover{color:var(--gold)}
.num-inp{width:90px;padding:5px 9px;border:1px solid var(--border);border-radius:0;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text-main);background:var(--white);outline:none}
.num-inp:focus{border-color:var(--gold)}
.mini-prog{height:3px;background:var(--border);border-radius:0;overflow:hidden;min-width:64px}
.mini-fill{height:100%;border-radius:0;background:var(--gold)}
.rem-pos{color:var(--green);font-weight:600}
.rem-neg{color:var(--red);font-weight:600}

/* ── DRAWER ── */
#drawer-root{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(10,10,10,.65);backdrop-filter:blur(2px)}
#drawer-root.open{display:flex}
.drawer{background:var(--white);border-radius:0;width:440px;max-width:94vw;box-shadow:0 20px 60px rgba(10,10,10,.5);overflow:hidden;animation:fadeUp .25s ease;border-top:3px solid var(--gold)}
.drawer-head{background:var(--charcoal);padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{font-family:'Playfair Display',serif;color:#fff;font-size:21px;font-weight:700}
.drawer-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.drawer-close:hover{background:rgba(255,255,255,.25)}
.drawer-body{padding:22px}
.drawer-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.dr-stat{text-align:center;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:0;padding:12px 8px}
.dr-stat .ds-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.dr-stat .ds-val{font-family:'Playfair Display',serif;font-size:23px;font-weight:700;color:var(--charcoal);margin-top:3px}
.goto-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.07);border:1px solid var(--border);color:var(--gold-dark);padding:8px 18px;border-radius:0;font-size:15px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-weight:600;margin-top:16px;transition:all .2s}
.goto-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

/* ── VENDOR CARD ── */
.vendor-card{background:var(--white);border-radius:0;padding:18px 20px;border:1px solid var(--border);border-top:2px solid var(--gold);margin-bottom:14px}
.check-row{display:flex;align-items:center;gap:7px;font-size:16px;cursor:pointer;color:var(--text-muted);margin-bottom:4px;user-select:none}
.check-row input{accent-color:var(--gold)}

/* ── SCHEDULE ROW ── */
.sched-row{background:var(--white);border-radius:0;padding:14px 18px;border:1px solid var(--border);border-left:3px solid var(--gold);margin-bottom:10px;display:grid;grid-template-columns:100px 120px 1fr 1fr auto;gap:12px;align-items:end}

/* ── RING STAGE ── */
.ring-stage{text-align:center;padding:52px 32px;background:var(--black);border-radius:0;border:1px solid rgba(201,168,76,.3)}
.sparkle-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin:24px 0}
.sparkle-item{text-align:center}
.sparkle-item .sp-ico{font-size:30px;display:block;margin-bottom:5px;color:var(--gold)}
.sparkle-item .sp-lbl{font-size:14px;color:rgba(255,255,255,.55)}

/* ── CHART ── */
#chart-wrap{position:relative;max-width:320px;margin:0 auto 20px;display:none}
#chart-wrap.visible{display:block}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}

/* ── FOOTER NAV ── */
.stage-footer{display:flex;justify-content:space-between;align-items:center;padding:20px 32px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}

/* ── TABLE WRAP ── */
.tbl-wrap{width:100%}

/* ── SIDEBAR DATA BUTTONS ── */
.sb-data{padding:8px 14px 16px;display:flex;gap:8px}
.sb-export-btn,.sb-import-lbl{flex:1;text-align:center;padding:7px 0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:0;font-family:'Cormorant Garamond',serif;transition:all .2s;border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.5);background:transparent;display:block}
.sb-export-btn:hover,.sb-import-lbl:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07)}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;display:none}
  #sidebar-backdrop.open{display:block}
  #hamburger{display:block}
  .hero-wrap{height:170px}
  .stage-body{padding:18px 16px}
  .stage-footer{padding:14px 16px}
  .grid-2,.grid-4{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr !important}
  .sched-row{grid-template-columns:1fr 1fr auto}
  .tbl-wrap{overflow-x:auto}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-brand" id="sb-brand"></div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-prog">
      <div class="sb-prog-lbl">Planning progress</div>
      <div class="sb-prog-track"><div class="sb-prog-fill" id="sb-prog-fill" style="width:0%"></div></div>
      <div class="sb-prog-pct" id="sb-prog-pct">0% complete</div>
    </div>
    <div class="sb-data">
      <button class="sb-export-btn" onclick="exportData()">⬇ Export</button>
      <label class="sb-import-lbl">⬆ Import<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
  </div>
  <div id="sidebar-backdrop"></div>
  <div id="main">
    <div id="topbar">
      <div class="tb-left">
        <button id="hamburger">☰</button>
        <div class="tb-crumb" id="tb-crumb"></div>
      </div>
      <button id="budget-pill">✦ $0 remaining</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="drawer-root"></div>
<script>
// ═══════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════
const DEFAULT = {
  couple: { p1: '', p2: '', date: '' },
  vision: { style: '', colors: '', vibe: '', notes: '' },
  budget: {
    total: 25000,
    cats: [
      { id: 'venue',      name: 'Venue & Rentals',          allocated: 6000, spent: 0, stage: 'venue',     notes: '' },
      { id: 'catering',   name: 'Catering & Cake',          allocated: 5000, spent: 0, stage: 'vendors',   notes: '' },
      { id: 'photo',      name: 'Photography & Video',      allocated: 4000, spent: 0, stage: 'vendors',   notes: '' },
      { id: 'flowers',    name: 'Flowers & Décor',          allocated: 2500, spent: 0, stage: 'vendors',   notes: '' },
      { id: 'attire',     name: 'Dress & Attire',           allocated: 2500, spent: 0, stage: 'attire',    notes: '' },
      { id: 'music',      name: 'Music & Entertainment',    allocated: 1500, spent: 0, stage: 'vendors',   notes: '' },
      { id: 'honeymoon',  name: 'Honeymoon',                allocated: 3000, spent: 0, stage: 'honeymoon', notes: '' },
      { id: 'stationery', name: 'Invitations & Stationery', allocated:  600, spent: 0, stage: null,        notes: '' },
      { id: 'rings',      name: 'Rings',                    allocated: 2400, spent: 0, stage: 'ring',      notes: '' },
      { id: 'misc',       name: 'Miscellaneous',            allocated: 1000, spent: 0, stage: null,        notes: '' },
    ],
  },
  venue:     { name: '', location: '', date: '', capacity: '', cost: '', contact: '', notes: '' },
  guests:    [],
  vendors:   [],
  attire:    {
    bride: { item: '', shop: '', price: '', fitting: '', notes: '' },
    groom: { item: '', shop: '', price: '', fitting: '', notes: '' },
  },
  ceremony:  { officiant: '', duration: '', readings: '', vows: '', music: '', notes: '' },
  honeymoon: { destination: '', accommodation: '', depart: '', returnD: '', budget: '', notes: '' },
  schedule:  [],
};

function loadData() {
  try {
    const s = localStorage.getItem('wpData_v2');
    if (!s) return JSON.parse(JSON.stringify(DEFAULT));
    const saved = JSON.parse(s);
    // Deep merge to pick up any new DEFAULT keys
    return {
      ...DEFAULT,
      ...saved,
      budget: {
        ...DEFAULT.budget,
        ...saved.budget,
        cats: saved.budget?.cats || DEFAULT.budget.cats,
      },
      attire: {
        bride: { ...DEFAULT.attire.bride, ...saved.attire?.bride },
        groom: { ...DEFAULT.attire.groom, ...saved.attire?.groom },
      },
    };
  } catch { return JSON.parse(JSON.stringify(DEFAULT)); }
}

let D = loadData();
let saveTimer = null;

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('wpData_v2', JSON.stringify(D));
  }, 600);
}

// ── HELPERS ──────────────────────────────────────
function fmt(n) { return '$' + (Number(n) || 0).toLocaleString(); }
function uid()  { return Date.now() + Math.random().toString(36).slice(2,7); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
// STAGES CONFIG
// ═══════════════════════════════════════════════
const STAGES = [
  { id:'vision',    label:'Engagement & Vision',  emoji:'✨', short:'Vision',    tagline:'Where your forever begins',             img:'https://images.unsplash.com/photo-1606216794074-735e91aa2c92?w=1200&q=80' },
  { id:'budget',    label:'Budget & Finance',      emoji:'💰', short:'Budget',    tagline:'Plan beautifully, spend wisely',         img:'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1200&q=80' },
  { id:'venue',     label:'Venue & Date',          emoji:'🏛️', short:'Venue',     tagline:'Find your perfect backdrop',            img:'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=1200&q=80' },
  { id:'guests',    label:'Guest List',            emoji:'💌', short:'Guests',    tagline:'Gather your favourite people',          img:'https://images.unsplash.com/photo-1529543544282-ea669407fca3?w=1200&q=80' },
  { id:'vendors',   label:'Vendors',               emoji:'🌸', short:'Vendors',   tagline:'Flowers, photos & every detail',        img:'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=1200&q=80' },
  { id:'attire',    label:'Dress & Attire',        emoji:'👗', short:'Attire',    tagline:'Look & feel your most radiant',         img:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=1200&q=80' },
  { id:'ceremony',  label:'Ceremony Planning',     emoji:'💒', short:'Ceremony',  tagline:"Craft your unforgettable 'I do'",       img:'https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=1200&q=80' },
  { id:'honeymoon', label:'Honeymoon',             emoji:'🌴', short:'Honeymoon', tagline:'Your first adventure as one',           img:'https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=1200&q=80' },

// ═══════════════════════════════════════════════
// SIDEBAR RENDER + UPDATE
// ═══════════════════════════════════════════════
function updateSidebar() {
  const p1 = D.couple.p1 || 'Partner 1';
  const p2 = D.couple.p2 || 'Partner 2';
  const names = (D.couple.p1 && D.couple.p2) ? `${p1} & ${p2}` : '✦ Wedding Planner';
  document.title = (D.couple.p1 && D.couple.p2) ? `${p1} & ${p2} — Wedding Planner ✦` : 'Wedding Planner ✦';

  let countdownHtml = '';
  if (D.couple.date) {
    const today = new Date(); today.setHours(0,0,0,0);
    const wed   = new Date(D.couple.date + 'T12:00:00');
    const diff  = Math.ceil((wed - today) / 86400000);
    if (diff > 0) {
      countdownHtml = `<div class="sb-countdown"><div class="sb-days pf">${diff}</div><div class="sb-days-lbl">days to go</div></div>`;
    } else if (diff === 0) {
      countdownHtml = `<div class="sb-countdown"><div class="sb-days pf">🎉</div><div class="sb-days-lbl">Today's the day!</div></div>`;
    }
  }

  document.getElementById('sb-brand').innerHTML = `
    <div class="sb-names">${names}</div>
    ${D.couple.date ? `<div class="sb-date">${new Date(D.couple.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>` : ''}
    ${countdownHtml}
  `;

  document.getElementById('sb-nav').innerHTML = STAGES.map(s => {
    const isActive = activeStageId === s.id;
    const isDone   = stageHasData(s.id);
    const diamond  = isActive
      ? `<span class="si-ico"><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,0 14,7 7,14 0,7" fill="#C9A84C"/><polygon points="7,3 11,7 7,11 3,7" fill="none" stroke="#FAF7F0" stroke-width=".7"/></svg></span>`
      : isDone
      ? `<span class="si-ico"><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,0 14,7 7,14 0,7" fill="rgba(201,168,76,.5)" stroke="#C9A84C" stroke-width=".8"/></svg></span>`
      : `<span class="si-ico"><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,0 14,7 7,14 0,7" fill="none" stroke="rgba(201,168,76,.35)" stroke-width=".8"/></svg></span>`;
    return `
      <div class="sb-item${isActive?' active':''}${isDone?' done':''}" data-stage="${s.id}">
        ${diamond}
        <span class="si-lbl">${s.label}</span>
        <span class="si-dot"></span>
      </div>`;
  }).join('');

  const done = STAGES.filter(s => stageHasData(s.id)).length;
  const pct  = Math.round((done / STAGES.length) * 100);
  document.getElementById('sb-prog-fill').style.width = pct + '%';
  document.getElementById('sb-prog-pct').textContent  = pct + '% complete';

  const total = Number(D.budget.total) || 0;
  const spent = D.budget.cats.reduce((s,c) => s + (Number(c.spent)||0), 0);
  document.getElementById('budget-pill').textContent = '✦ ' + fmt(total - spent) + ' remaining';

}

function stageHasData(id) {
  if (id === 'vision')    return !!(D.couple.p1 || D.couple.p2 || D.vision.notes);
  if (id === 'budget')    return D.budget.cats.some(c => c.spent > 0);
  if (id === 'venue')     return !!(D.venue.name || D.venue.date);
  if (id === 'guests')    return D.guests.length > 0;
  if (id === 'vendors')   return D.vendors.length > 0;
  if (id === 'attire')    return !!(D.attire.bride.item || D.attire.groom.item);
  if (id === 'ceremony')  return !!(D.ceremony.officiant || D.ceremony.vows);
  if (id === 'honeymoon') return !!(D.honeymoon.destination);
  if (id === 'schedule')  return D.schedule.length > 0;
  if (id === 'ring')      return !!(D.couple.p1 && D.couple.p2 && D.couple.date);
  return false;
}

function goTo(stageId) {
  activeStageId = stageId;
  if (budgetChartInstance) { budgetChartInstance.destroy(); budgetChartInstance = null; }
  updateSidebar();
  renderStageContent();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

function renderStageContent() {
  const idx   = STAGES.findIndex(s => s.id === activeStageId);
  const stage = STAGES[idx];

  document.getElementById('tb-crumb').innerHTML =
    `Stage <strong>${idx+1} of ${STAGES.length}</strong> — ${stage.label}`;

  const heroHtml = `
    <div class="hero-wrap">
      <img class="hero-img" src="${stage.img}" alt="${stage.label}"
        onerror="this.style.background='linear-gradient(135deg,#1A1A1A,#0A0A0A)';this.removeAttribute('src')">
      <div class="hero-overlay"></div>
      <div class="deco-frame">
        <div class="deco-corner tl"></div>
        <div class="deco-corner tr"></div>
        <div class="deco-corner bl"></div>
        <div class="deco-corner br"></div>
      </div>
      <div class="hero-text">
        <div class="hero-num">✦ Stage ${idx+1} of ${STAGES.length} ✦</div>
        <div class="hero-title">${stage.label}</div>
        <div class="hero-tagline">${stage.tagline}</div>
      </div>
    </div>
    <div class="deco-divider">
      <svg width="100%" height="32" viewBox="0 0 600 32" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="16" x2="260" y2="16" stroke="#C9A84C" stroke-width=".8" opacity=".6"/>
        <polygon points="290,8 300,16 290,24 280,16" fill="none" stroke="#C9A84C" stroke-width=".8" opacity=".9"/>
        <polygon points="300,12 306,16 300,20 294,16" fill="#C9A84C" opacity=".5"/>
        <line x1="340" y1="16" x2="600" y2="16" stroke="#C9A84C" stroke-width=".8" opacity=".6"/>
      </svg>
    </div>
  `;

  const prevStage = idx > 0 ? STAGES[idx-1] : null;
  const nextStage = idx < STAGES.length-1 ? STAGES[idx+1] : null;
  const footerHtml = `
    <div class="stage-footer">
      ${prevStage ? `<button class="ghost-btn" onclick="goTo('${prevStage.id}')">← Previous</button>` : '<div></div>'}
      <div style="flex:1"></div>
      ${nextStage ? `<button class="gold-btn" onclick="goTo('${nextStage.id}')">Next Stage →</button>` : ''}
    </div>
  `;

  let bodyHtml = '';
  if      (activeStageId === 'vision')    bodyHtml = renderVision();
  else if (activeStageId === 'budget')    bodyHtml = renderBudget();
  else if (activeStageId === 'venue')     bodyHtml = renderVenue();
  else if (activeStageId === 'guests')    bodyHtml = renderGuests();
  else if (activeStageId === 'vendors')   bodyHtml = renderVendors();
  else if (activeStageId === 'attire')    bodyHtml = renderAttire();
  else if (activeStageId === 'ceremony')  bodyHtml = renderCeremony();
  else if (activeStageId === 'honeymoon') bodyHtml = renderHoneymoon();
  else if (activeStageId === 'schedule')  bodyHtml = renderSchedule();
  else if (activeStageId === 'ring')      bodyHtml = renderRing();

  document.getElementById('content').innerHTML =
    `<div class="fade-up">${heroHtml}<div class="stage-body">${bodyHtml}</div>${footerHtml}</div>`;

  document.getElementById('content').scrollTop = 0;

  if      (activeStageId === 'vision')    bindVision();
  else if (activeStageId === 'budget')    bindBudget();
  else if (activeStageId === 'venue')     bindVenue();
  else if (activeStageId === 'guests')    bindGuests();
  else if (activeStageId === 'vendors')   bindVendors();
  else if (activeStageId === 'attire')    bindAttire();
  else if (activeStageId === 'ceremony')  bindCeremony();
  else if (activeStageId === 'honeymoon') bindHoneymoon();
  else if (activeStageId === 'schedule')  bindSchedule();
}

function renderBudget() {
  const cats   = D.budget.cats;
  const total  = Number(D.budget.total) || 0;
  const alloc  = cats.reduce((s,c) => s+(Number(c.allocated)||0), 0);
  const spent  = cats.reduce((s,c) => s+(Number(c.spent)||0), 0);
  const left   = total - spent;
  const pct    = total > 0 ? Math.min(100, (spent/total)*100) : 0;

  const statsHtml = `
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      ${[
        ['Total Budget',  fmt(total), 'var(--charcoal)'],
        ['Allocated',     fmt(alloc), 'var(--gold)'],
        ['Spent So Far',  fmt(spent), '#C9828F'],
        ['Remaining',     fmt(left),  left>=0?'var(--green)':'var(--red)'],
      ].map(([l,v,c])=>`<div class="stat-card"><div class="stat-lbl">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join('')}
    </div>`;

  const progHtml = `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px;color:var(--text-muted)">Budget used</span>
        <span style="font-size:13px;font-weight:600;color:var(--gold-dark)">${pct.toFixed(1)}%</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>90?'var(--red)':'var(--gold)'}"></div></div>
      <div style="margin-top:16px">
        <label class="lbl">Your Total Wedding Budget ($)</label>
        <input class="inp" id="budget-total-inp" type="number" value="${total}" placeholder="e.g. 25000" style="margin-top:5px">
      </div>
    </div>`;

  const chartHtml = `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title pf" style="margin:0">Spending by Category</div>
        <button class="outline-btn" id="toggle-chart-btn">Show Chart</button>
      </div>
      <div id="chart-wrap"><canvas id="budget-chart"></canvas></div>
    </div>`;

  const tableRows = cats.map(c => {
    const rem = (Number(c.allocated)||0) - (Number(c.spent)||0);
    const cp  = c.allocated > 0 ? Math.min(100, ((Number(c.spent)||0) / c.allocated)*100) : 0;
    const nameHtml = c.stage
      ? `<span class="cat-link" data-goto="${c.stage}">${c.name} ↗</span>`
      : `<span style="font-weight:500">${c.name}</span>`;
    return `
      <tr>
        <td>${nameHtml}</td>
        <td><input class="num-inp" type="number" data-cat="${c.id}" data-f="allocated" value="${c.allocated}"></td>
        <td><input class="num-inp" type="number" data-cat="${c.id}" data-f="spent" value="${c.spent}"></td>
        <td class="${rem>=0?'rem-pos':'rem-neg'}">${fmt(rem)}</td>
        <td><div class="mini-prog"><div class="mini-fill" style="width:${cp}%;background:${cp>90?'var(--red)':'var(--gold)'}"></div></div></td>
        <td><button class="outline-btn" data-drawer="${c.id}">View Detail</button></td>
      </tr>`;
  }).join('');

  const tableHtml = `
    <div class="card">
      <div class="card-hdr"><div class="card-title pf">Budget Breakdown</div><div class="card-sub">Click a category name to jump to that stage. Edit numbers inline. Use "View Detail" for a full breakdown.</div></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Category</th><th>Allocated ($)</th><th>Spent ($)</th><th>Remaining</th><th style="min-width:80px">Progress</th><th></th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>
    </div>`;

  return `${statsHtml}${progHtml}${chartHtml}${tableHtml}`;
}

function bindBudget() {
  document.getElementById('budget-total-inp')?.addEventListener('input', e => {
    D.budget.total = Number(e.target.value) || 0;
    save(); updateSidebar();
  });

  document.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('input', () => {
      const cat = D.budget.cats.find(c => c.id === el.dataset.cat);
      if (cat) { cat[el.dataset.f] = Number(el.value) || 0; save(); updateSidebar(); }
    });
  });

  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => goTo(el.dataset.goto));
  });

  document.getElementById('toggle-chart-btn')?.addEventListener('click', () => {
    const wrap = document.getElementById('chart-wrap');
    const btn  = document.getElementById('toggle-chart-btn');
    const visible = wrap.classList.toggle('visible');
    btn.textContent = visible ? 'Hide Chart' : 'Show Chart';
    if (visible) renderBudgetChart();
    else if (budgetChartInstance) { budgetChartInstance.destroy(); budgetChartInstance = null; }
  });

  document.querySelectorAll('[data-drawer]').forEach(btn => {
    btn.addEventListener('click', () => openDrawer(btn.dataset.drawer));
  });
}
function renderBudgetChart() {
  const cats  = D.budget.cats.filter(c => Number(c.spent) > 0);
  if (cats.length === 0) {
    document.getElementById('chart-wrap').innerHTML = '<p style="text-align:center;color:var(--text-muted);font-style:italic;padding:20px">No spending recorded yet.</p>';
    return;
  }
  const palette = ['#C9A84C','#8B6914','#E8D49A','#1A1A1A','#4A7C59','#A08030','#5A4A20','#D4B870','#2A2A2A','#7A6A40'];
  const canvas = document.getElementById('budget-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (budgetChartInstance) budgetChartInstance.destroy();
  budgetChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: cats.map(c => c.name),
      datasets: [{ data: cats.map(c => Number(c.spent)||0), backgroundColor: palette.slice(0, cats.length), borderWidth: 2, borderColor: '#FAF7F0' }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: "'Cormorant Garamond', serif", size: 13 }, color: '#1A1A1A' } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: $${ctx.parsed.toLocaleString()}` } },
      },
    },
  });
}
function openDrawer(catId) {
  const cat   = D.budget.cats.find(c => c.id === catId);
  if (!cat) return;
  const alloc = Number(cat.allocated) || 0;
  const spent = Number(cat.spent)     || 0;
  const rem   = alloc - spent;
  const pct   = alloc > 0 ? Math.min(100, (spent / alloc) * 100) : 0;
  const over  = rem < 0;

  const gotoHtml = cat.stage
    ? `<button class="goto-btn" onclick="closeDrawer();goTo('${cat.stage}')">↗ Go to ${STAGES.find(s=>s.id===cat.stage)?.label||cat.stage} stage</button>`
    : '';

  document.getElementById('drawer-root').innerHTML = `
    <div class="drawer">
      <div class="drawer-head">
        <h3 class="pf">${cat.name}</h3>
        <button class="drawer-close" onclick="closeDrawer()">×</button>
      </div>
      <div class="drawer-body">
        <div class="drawer-stats">
          <div class="dr-stat"><div class="ds-lbl">Allocated</div><div class="ds-val">${fmt(alloc)}</div></div>
          <div class="dr-stat"><div class="ds-lbl">Spent</div><div class="ds-val" style="color:${over?'var(--red)':'var(--charcoal)'}">${fmt(spent)}</div></div>
          <div class="dr-stat"><div class="ds-lbl">${over?'Over by':'Remaining'}</div><div class="ds-val" style="color:${over?'var(--red)':'var(--green)'}">${over?fmt(-rem):fmt(rem)}</div></div>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${pct.toFixed(1)}% of budget used</div>
        <div class="prog-bg" style="height:8px;margin-bottom:20px"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${pct>90?'var(--red)':'var(--gold)'};height:100%"></div></div>
        <div class="grid-2" style="margin-bottom:14px">
          <div class="fld"><label class="lbl">Allocated ($)</label><input class="inp" id="dr-allocated" type="number" value="${alloc}"></div>
          <div class="fld"><label class="lbl">Spent ($)</label><input class="inp" id="dr-spent" type="number" value="${spent}"></div>
        </div>
        <div class="fld"><label class="lbl">Notes</label><textarea class="inp" id="dr-notes">${esc(cat.notes)}</textarea></div>
        ${gotoHtml}
      </div>
    </div>
  `;
  document.getElementById('drawer-root').classList.add('open');

  ['dr-allocated','dr-spent','dr-notes'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', e => {
      if (id === 'dr-allocated') cat.allocated = Number(e.target.value) || 0;
      else if (id === 'dr-spent') cat.spent = Number(e.target.value) || 0;
      else cat.notes = e.target.value;
      save(); updateSidebar();
    });
  });

  document.getElementById('drawer-root').addEventListener('click', e => {
    if (e.target === document.getElementById('drawer-root')) closeDrawer();
  }, { once: true });
}
function closeDrawer() {
  document.getElementById('drawer-root').classList.remove('open');
  document.getElementById('drawer-root').innerHTML = '';
  if (activeStageId === 'budget') goTo('budget');
}

// EXPORT / IMPORT
// ═══════════════════════════════════════════════
function exportData() {
  const name = (D.couple.p1 && D.couple.p2)
    ? `${D.couple.p1}-${D.couple.p2}-wedding.json`
    : 'my-wedding.json';
  const blob = new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      D = {
        ...DEFAULT,
        ...parsed,
        budget: { ...DEFAULT.budget, ...parsed.budget, cats: parsed.budget?.cats || DEFAULT.budget.cats },
        attire: {
          bride: { ...DEFAULT.attire.bride, ...parsed.attire?.bride },
          groom: { ...DEFAULT.attire.groom, ...parsed.attire?.groom },
        },
      };
      localStorage.setItem('wpData_v2', JSON.stringify(D));
      updateSidebar();
      goTo(activeStageId);
    } catch {
      alert('Could not read that file. Please use a valid wedding planner export (.json).');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
